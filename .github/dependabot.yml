version: 2
updates:
  # Python updates
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"

  # GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # JavaScript/Node.js updates
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
