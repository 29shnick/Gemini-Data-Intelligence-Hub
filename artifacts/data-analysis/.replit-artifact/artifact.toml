kind = "web"
previewPath = "/"
title = "Data Analysis AI"
version = "1.0.0"
id = "artifacts/data-analysis"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5000

[services.development]
run = "streamlit run /home/runner/workspace/artifacts/data-analysis-app/app.py --server.port 5000 --server.headless true --browser.gatherUsageStats false"

[services.production]
build = [ "echo", "no-build-needed" ]
publicDir = "artifacts/data-analysis-app"
serve = "static"

[services.env]
PORT = "5000"
BASE_PATH = "/"
